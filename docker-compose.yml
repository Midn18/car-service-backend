version: "3.9"

services:

  postgres:
    image: postgres:16
    platform: linux/amd64
    container_name: postgres
    environment:
      POSTGRES_DB: car_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d car_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 10


  customer-service:
    build:
      context: .
      dockerfile: customer-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      MONGODB_USERNAME: mihaildanilenco
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_CLAIMS_NAMESPACE: ${AUTH0_CLAIMS_NAMESPACE:-https://carservice.com}
      EMPLOYEE_SERVICE_URL: http://employee-service:8082
    depends_on:
      mongodb:
        condition: service_healthy
      employee-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  employee-service:
    build:
      context: .
      dockerfile: employee-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  mongodb:
    image: mongo:7
    platform: linux/amd64
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:
  postgres_data:
