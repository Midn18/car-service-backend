server:
  port: 8081

spring:
  data:
    mongodb:
      username: ${MONGODB_USERNAME:mihaildanilenco}
      password: ${MONGODB_PASSWORD}
      uri: "mongodb+srv://${spring.data.mongodb.username}:${spring.data.mongodb.password}@learningdb.qe33ksl.mongodb.net/car-service?retryWrites=true&w=majority&appName=LearningDB"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/car-service-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/car-service-realm/protocol/openid-connect/certs}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "com.carservice.event"

keycloak:
  realm: ${KEYCLOAK_REALM}
  server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080/}
  admin-realm: car-service-realm
  client-id: admin-cli
  username: ${KEYCLOAK_ADMIN_USERNAME}
  password: ${KEYCLOAK_ADMIN_PASSWORD}
  oauth-client-id: ${KEYCLOAK_RESOURCE:car-service-client}
  oauth-client-secret: ${KEYCLOAK_CLIENT_SECRET}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}

logging:
  level:
    com.car-service: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG

scheduler:
  cron:
    appointment-slot-generator: "0 0 0 * * *"