server:
  port: 8081

spring:
  data:
    mongodb:
      username: ${MONGODB_USERNAME:mihaildanilenco}
      password: ${MONGODB_PASSWORD}
      uri: "mongodb+srv://${spring.data.mongodb.username}:${spring.data.mongodb.password}@learningdb.qe33ksl.mongodb.net/car-service?retryWrites=true&w=majority&appName=LearningDB"
  security:
    oauth2:
      resourceserver:
        jwt:
          # Auth0 issuer URI – Spring Boot will auto-discover the JWKS endpoint from here
          issuer-uri: https://${AUTH0_DOMAIN}/

# ── Services ──────────────────────────────────────────────────────────────────
services:
  employee:
    url: ${EMPLOYEE_SERVICE_URL:http://localhost:8082}

# ── Auth0 ─────────────────────────────────────────────────────────────────────
auth0:
  domain: ${AUTH0_DOMAIN}
  client-id: ${AUTH0_CLIENT_ID}
  client-secret: ${AUTH0_CLIENT_SECRET}
  audience: ${AUTH0_AUDIENCE}
  management-api-audience: https://${AUTH0_DOMAIN}/api/v2/
  # Namespace prefix used in the Auth0 Post-Login Action for custom claims
  claims-namespace: ${AUTH0_CLAIMS_NAMESPACE:https://carservice.com}

logging:
  level:
    com.car-service: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG

scheduler:
  cron:
    appointment-slot-generator: "0 0 0 * * *"